<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barter Simulation — Trading Tokens (Part A of 3)</title>
<style>
  :root { --cut: #c0c0c0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, serif;
    background: #ede9e0;
    padding: 5mm 0 4mm;
  }

  .page-header {
    text-align: center;
    margin-bottom: 4mm;
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }
  .page-header h1 { font-size: 12pt; color: #1e4d5c; font-weight: 600; letter-spacing: 0.04em; margin-bottom: 1.5mm; }
  .page-header p  { font-size: 8pt; color: #888; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    width: 100%;
    margin: 0 auto;
  }

  .token {
    width: 100%;
    height: 88mm;
    border: 1px dashed var(--cut);
    padding: 2.5mm;
    background: white;
    display: flex;
  }

  .token-inner {
    width: 100%;
    border: 2px solid var(--accent, #888);
    border-radius: 3.5mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .token-header {
    width: 100%;
    background: var(--accent, #888);
    color: white;
    text-align: center;
    padding: 2mm 2mm 1.5mm;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 7.5pt;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .token-art {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1mm;
  }

  .token-art svg { width: 46mm; height: 46mm; }

  .token-footer {
    width: 100%;
    border-top: 1.5px solid rgba(0,0,0,0.12);
    padding: 2mm 2mm 2.5mm;
    text-align: center;
  }

  .maori   { font-style: italic; font-size: 10.5pt; font-weight: bold; color: var(--accent, #555); line-height: 1.2; }
  .english { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 7pt; color: #777; margin-top: 0.8mm; }

  .spare .token-inner { border: 1.5px dashed #ccc; align-items: center; justify-content: center; }
  .spare-label { font-family: Arial, sans-serif; font-size: 8pt; color: #bbb; }

  .tally {
    text-align: center;
    font-family: Arial, sans-serif;
    font-size: 7.5pt;
    color: #aaa;
    padding: 3mm 0 2mm;
    width: 100%;
    margin: 0 auto;
    border-top: 0.5px solid #ddd;
  }

  @media print {
    body { background: white; padding: 1.5cm; box-sizing: border-box; }
    @page { size: A4 portrait; margin: 0; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Barter Simulation — Trading Tokens &nbsp;(Part A of 2)</h1>
  <p>Print on card stock if possible &nbsp;·&nbsp; Cut along dashed lines &nbsp;·&nbsp; Each group receives the tokens listed on their resource card</p>
</div>

<div class="grid" id="grid"></div>
<div class="tally" id="tally"></div>

<script>
const svgs = {

kaimoana: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">

    <ellipse cx="36" cy="14" rx="28" ry="11" fill="#2471a3"/>
    <polygon points="64,14 80,6 80,22" fill="#1a5276"/>
    <circle cx="16" cy="11" r="3.2" fill="white"/><circle cx="16" cy="11" r="1.5" fill="#0d2f45"/>
    <path d="M38,6 Q48,4 56,8" stroke="#5dade2" stroke-width="1.4" fill="none"/>
    <path d="M38,22 Q48,24 56,20" stroke="#5dade2" stroke-width="1.4" fill="none"/>
  </g>
  <g transform="translate(12,50) rotate(7)">
    <ellipse cx="32" cy="12" rx="25" ry="10" fill="#1a6fa0"/>
    <polygon points="57,12 72,5 72,19" fill="#154e78"/>
    <circle cx="14" cy="10" r="2.8" fill="white"/><circle cx="14" cy="10" r="1.2" fill="#0d2f45"/>
    <path d="M34,5 Q43,3 50,7" stroke="#7fb3d3" stroke-width="1.3" fill="none"/>
  </g>
  <g transform="translate(4,80) rotate(-5)">
    <ellipse cx="34" cy="12" rx="27" ry="10" fill="#5b9fc2"/>
    <polygon points="61,12 76,5 76,19" fill="#2471a3"/>
    <circle cx="15" cy="10" r="2.8" fill="white"/><circle cx="15" cy="10" r="1.2" fill="#0d2f45"/>
  </g>
  <path d="M8,110 Q35,106 60,110 Q85,114 112,110" stroke="#aed6f1" stroke-width="1.5" fill="none" opacity="0.45"/>
</svg>`,

kumara: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <path d="M22,92 Q18,74 20,56 Q22,40 60,37 Q98,40 100,56 Q102,74 98,92 Z" fill="#c9a35a" stroke="#7d5a0a" stroke-width="2"/>
  <path d="M21,74 Q60,70 99,74" stroke="#7d5a0a" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M20,63 Q60,59 100,63" stroke="#7d5a0a" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M21,52 Q60,48 99,52" stroke="#7d5a0a" stroke-width="1.2" fill="none" opacity="0.45"/>
  <line x1="38" y1="38" x2="30" y2="91" stroke="#7d5a0a" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="37" x2="60" y2="92" stroke="#7d5a0a" stroke-width="1" opacity="0.3"/>
  <line x1="82" y1="38" x2="90" y2="91" stroke="#7d5a0a" stroke-width="1" opacity="0.3"/>
  <ellipse cx="60" cy="92" rx="38" ry="8" fill="#c9a35a" stroke="#7d5a0a" stroke-width="2"/>
  <ellipse cx="42" cy="66" rx="17" ry="10" fill="#a93226" stroke="#7b2119" stroke-width="1.5" transform="rotate(-18,42,66)"/>
  <ellipse cx="66" cy="61" rx="16" ry="9.5" fill="#c0392b" stroke="#922b21" stroke-width="1.5" transform="rotate(12,66,61)"/>
  <ellipse cx="54" cy="50" rx="14" ry="8.5" fill="#a93226" stroke="#7b2119" stroke-width="1.5" transform="rotate(-5,54,50)"/>
</svg>`,

pounamu: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="jade" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#a9dfbf"/>
      <stop offset="35%" stop-color="#27ae60"/>
      <stop offset="75%" stop-color="#1e8449"/>
      <stop offset="100%" stop-color="#0b5c2e"/>
    </radialGradient>
  </defs>
  <path d="M42,22 Q28,18 20,32 Q12,46 16,64 Q20,80 32,90 Q46,100 62,98 Q78,96 88,84 Q98,70 96,54 Q94,38 82,28 Q70,18 54,20 Q48,21 42,22 Z" fill="url(#jade)" stroke="#0b5c2e" stroke-width="2"/>
  <path d="M36,38 Q52,32 68,40 Q80,48 78,64" stroke="#145a32" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M26,56 Q40,50 58,54 Q70,58 72,70" stroke="#1d8348" stroke-width="1" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M30,72 Q44,68 56,74" stroke="#145a32" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="56" cy="30" r="4" fill="#0a3d1f" stroke="#0b5c2e" stroke-width="1"/>
  <circle cx="56" cy="30" r="1.8" fill="#d5f5e3" opacity="0.5"/>
  <ellipse cx="40" cy="40" rx="10" ry="6" fill="white" opacity="0.22" transform="rotate(-30,40,40)"/>
  <path d="M30,38 Q38,34 44,40" stroke="white" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
</svg>`,

mata: `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="obs" cx="32%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#7f8c8d"/>
      <stop offset="45%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#17202a"/>
    </radialGradient>
  </defs>
  <path d="M60,12 L88,30 L96,55 L90,76 L74,92 L52,94 L32,84 L22,64 L24,42 L40,26 Z" fill="url(#obs)" stroke="#5d6d7e" stroke-width="1.5"/>
  <path d="M60,12 Q74,32 80,54 Q84,72 74,92" stroke="#7f8c8d" stroke-width="0.8" fill="none" opacity="0.45"/>
  <path d="M60,12 Q46,30 38,52 Q32,68 32,84" stroke="#7f8c8d" stroke-width="0.8" fill="none" opacity="0.45"/>
  <path d="M40,26 Q60,36 96,55" stroke="#aab7b8" stroke-width="0.7" fill="none" opacity="0.35"/>
  <path d="M24,42 Q52,50 96,55" stroke="#aab7b8" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M22,64 Q46,66 90,76" stroke="#aab7b8" stroke-width="0.6" fill="none" opacity="0.25"/>
  <path d="M48,18 Q66,24 74,38" stroke="white" stroke-width="2.2" fill="none" opacity="0.28" stroke-linecap="round"/>
  <path d="M42,28 Q52,32 58,42" stroke="white" stroke-width="1.5" fill="none" opacity="0.18" stroke-linecap="round"/>
  <line x1="88" y1="30" x2="96" y2="55" stroke="white" stroke-width="1.2" opacity="0.35"/>
</svg>`

};

const tokens = [
  { key:'kaimoana', accent:'#1a5276', maori:'Kaimoana', english:'Seafood · 1 bundle',         count:4 },
  { key:'kumara',   accent:'#935e0a', maori:'Kūmara',   english:'Sweet potato · 1 basket',    count:5 },
];

const grid = document.getElementById('grid');
let rendered = 0;

tokens.forEach(t => {
  for (let i = 0; i < t.count; i++) {
    const d = document.createElement('div');
    d.className = 'token';
    d.style.setProperty('--accent', t.accent);
    d.innerHTML = `<div class="token-inner">
      <div class="token-header">${t.maori}</div>
      <div class="token-art">${svgs[t.key]}</div>
      <div class="token-footer">
        <div class="maori">${t.maori}</div>
        <div class="english">${t.english}</div>
      </div>
    </div>`;
    grid.appendChild(d);
    rendered++;
  }
});

// fill to complete last row of 3
const fill = (3 - (rendered % 3)) % 3;
for (let i = 0; i < fill; i++) {
  const d = document.createElement('div');
  d.className = 'token spare';
  d.style.opacity = '0.2';
  d.innerHTML = `<div class="token-inner"><span class="spare-label">✂</span></div>`;
  grid.appendChild(d);
}

const total = tokens.reduce((s,t) => s+t.count, 0);
document.getElementById('tally').textContent =
  tokens.map(t=>`${t.maori} ×${t.count}`).join('  ·  ')
  + `  —  ${total} tokens`;
</script>
</body>
</html>
